[bar.default]
background_opacity = 0.59999998658895493
capsule = true
capsule_border = "primary"
capsule_opacity = 0.69999998435378075
center = [ "group:g2" ]
end = [ "group:g3", "volume" ]
margin_edge = 10
margin_ends = 10
radius = 8
start = [ "group:g1" ]

    [[bar.default.capsule_group]]
    border = "primary"
    enabled = true
    fill = "surface_variant"
    id = "g1"
    members = [ "workspaces" ]
    opacity = 0.69999998807907104
    padding = 8.0

    [[bar.default.capsule_group]]
    border = "primary"
    enabled = true
    fill = "surface_variant"
    id = "g3"
    members = [ "tray", "notifications" ]
    opacity = 0.69999998807907104
    padding = 6.0

    [[bar.default.capsule_group]]
    border = "primary"
    enabled = true
    fill = "surface_variant"
    id = "g2"
    members = [ "clock" ]
    opacity = 0.69999998807907104
    padding = 6.0

[control_center]
sidebar_section = "none"

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 96.0
    box_width = 256.0
    cx = 156.0
    cy = 1840.0
    output = "DP-1"
    rotation = 0.0
    type = "weather"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        background_opacity = 0.5
        shadow = true
        show_forecast = false

[location]
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-login-box@DP-2" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 540.0
    cy = 1801.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[osd.kinds]
media = false

[plugins]
enabled = []

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    enabled = false
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
niri_overview_type_to_launch_enabled = true
polkit_agent = true
settings_show_advanced = true

    [shell.launcher]
    app_grid = true
    compact = true

    [shell.panel]
    open_near_click_control_center = true

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "5"
    variant = "destructive"

[theme]
builtin = "Noctalia"
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "ghostty", "helix", "kcolorscheme", "niri", "qt" ]
    enable_community_templates = false

[wallpaper]
directory = "/home/parkjb/Pictures/Wallpapers"
fill_color = "shadow"
fill_mode = "fit"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/parkjb/Pictures/Wallpapers/wallhaven-xeze5z_2560x1440.png"

    [wallpaper.last]
    path = "/home/parkjb/Pictures/Wallpapers/hollowknight-logo.png"

    [wallpaper.monitors.DP-1]
    path = "/home/parkjb/Pictures/Wallpapers/hollowknight-logo.png"

    [wallpaper.monitors.DP-2]
    path = "/home/parkjb/Pictures/Wallpapers/wallhaven-xeze5z_2560x1440.png"

[weather]
unit = "imperial"

[widget.bluetooth]
hide_when_no_connected_device = true

[widget.cat]
audio_spectrum = true
color = "tertiary"
enabled = true
tappy_mode = true
type = "noctalia/bongocat:cat"

[widget.clock]
capsule = true
capsule_radius = "auto"

[widget.input_volume]
show_label = false

[widget.media]
hide_when_no_media = true

[widget.network]
show_label = false

[widget.tray]
drawer = true
pinned = [ "Arch-Update" ]

[widget.volume]
show_label = false

[widget.weather]
show_condition = false
